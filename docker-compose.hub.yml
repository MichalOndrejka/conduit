services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  conduit:
    image: michalondrejka/conduit:latest
    ports:
      - "8000:8000"
    volumes:
      - conduit_data:/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # Add your credential env vars here, e.g.:
      # - ADO_PAT=${ADO_PAT}
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
  conduit_data:
