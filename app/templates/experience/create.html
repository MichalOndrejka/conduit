{% extends "base.html" %}
{% block title %}Add Experience{% endblock %}

{% block content %}
<div class="flex items-center gap-2 text-xs text-slate-500 mb-5">
    <a href="/experience" class="hover:text-violet-400 transition-colors">Experiences</a>
    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
    <span class="text-slate-400">Add Experience</span>
</div>

<div class="mb-6">
    <h1 class="text-lg font-semibold text-slate-100">Add Experience</h1>
    <p class="text-xs text-slate-500 mt-0.5">Store a situation and the guidance to apply when it is encountered</p>
</div>

<div class="card p-6 max-w-2xl">
    <form method="post" action="/experience/add">

        <div class="mb-5">
            <label class="field-label">Situation <span class="text-red-400">*</span><span class="tip"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01"/></svg><span class="tip-text">Describe the trigger — what kind of task or context should surface this rule</span></span></label>
            <textarea name="situation" rows="3" class="field-input resize-none"
                placeholder="e.g. writing integration tests that touch the database"
                required></textarea>
        </div>

        <div class="mb-6">
            <label class="field-label">Guidance <span class="text-red-400">*</span><span class="tip"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01"/></svg><span class="tip-text">The exact instruction to follow — what to do, avoid, or apply</span></span></label>
            <textarea name="guidance" rows="4" class="field-input resize-none"
                placeholder="e.g. Never mock the database. Use real DB connections — mocked tests passed but prod migrations failed."
                required></textarea>
        </div>

        <div class="border-t border-surface-border pt-5 flex items-center gap-3">
            <button type="submit" class="btn-primary inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
                Store Experience
            </button>
            <a href="/experience" class="btn-ghost inline-flex items-center px-4 py-2 rounded-lg text-sm font-medium">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
