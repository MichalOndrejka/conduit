{# Shared Custom API connection partial. #}
{% set cfg = source.config %}
{% set raw_auth = cfg.get("AuthType", "") %}
{% set current_auth = raw_auth if raw_auth else "none" %}

<div class="mb-4">
    <label class="field-label">Endpoint URL <span class="text-red-400">*</span></label>
    <input name="ConfigUrl" value="{{ cfg.get('Url', '') }}" id="customApiUrl" class="field-input font-mono" />
</div>

<div class="grid grid-cols-2 gap-4 mb-4">
    <div>
        <label class="field-label">HTTP Method</label>
        <select name="ConfigHttpMethod" class="field-input">
            <option value="GET"  {% if cfg.get('HttpMethod', 'GET') == 'GET'  %}selected{% endif %}>GET</option>
            <option value="POST" {% if cfg.get('HttpMethod', 'GET') == 'POST' %}selected{% endif %}>POST</option>
        </select>
    </div>
    <div>
        <label class="field-label">Authentication</label>
        <select id="customAuthTypeSelect" name="ConfigAuthType" class="field-input" onchange="updateCustomAuthFields()">
            <option value="none"   {% if current_auth == "none"   %}selected{% endif %}>None</option>
            <option value="bearer" {% if current_auth == "bearer" %}selected{% endif %}>Bearer Token</option>
            <option value="apikey" {% if current_auth == "apikey" %}selected{% endif %}>API Key</option>
        </select>
    </div>
</div>

<div id="custom-auth-bearer" {% if current_auth != "bearer" %}style="display:none"{% endif %} class="mb-4">
    <label class="field-label">Token Environment Variable</label>
    <input name="ConfigToken" value="{{ cfg.get('Token', '') }}" class="field-input font-mono" />
</div>

<div id="custom-auth-apikey" {% if current_auth != "apikey" %}style="display:none"{% endif %} class="mb-4">
    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="field-label">Header Name <span class="text-red-400">*</span></label>
            <input name="ConfigApiKeyHeader" value="{{ cfg.get('ApiKeyHeader', '') }}" class="field-input" />
        </div>
        <div>
            <label class="field-label">Header Value Env Var <span class="text-red-400">*</span></label>
            <input name="ConfigApiKeyValue" value="{{ cfg.get('ApiKeyValue', '') }}" class="field-input font-mono" />
        </div>
    </div>
</div>

<script>
function updateCustomAuthFields() {
    var t = document.getElementById('customAuthTypeSelect').value;
    document.getElementById('custom-auth-bearer').style.display = (t === 'bearer') ? '' : 'none';
    document.getElementById('custom-auth-apikey').style.display = (t === 'apikey') ? '' : 'none';
}
</script>

<p class="text-xs text-slate-500 mb-3 mt-5">Response mapping — how to extract documents from the JSON response</p>

<div class="mb-4">
    <label class="field-label">Items Path <span class="text-slate-600">(optional)</span><span class="tip"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01"/></svg><span class="tip-text">Dot-notation path to the array of items in the response, e.g. data.results. Leave blank if the root is the array.</span></span></label>
    <input name="ConfigItemsPath" value="{{ cfg.get('ItemsPath', '') }}" class="field-input font-mono" />
</div>

<div class="grid grid-cols-2 gap-4 mb-4">
    <div>
        <label class="field-label">Title Field<span class="tip"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01"/></svg><span class="tip-text">Field name in each item to use as the document title</span></span></label>
        <input name="ConfigTitleField" value="{{ cfg.get('TitleField', 'title') }}" class="field-input font-mono" />
    </div>
    <div>
        <label class="field-label">Content Fields <span class="text-slate-600">(optional)</span><span class="tip"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01"/></svg><span class="tip-text">Comma-separated field names to include as content. Leave blank to include all fields.</span></span></label>
        <input name="ConfigContentFields" value="{{ cfg.get('ContentFields', '') }}" class="field-input font-mono" />
    </div>
</div>
