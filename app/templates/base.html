<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Conduit{% endblock %} — Conduit</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: {
                        DEFAULT: 'hsl(222,47%,6%)',
                        1: 'hsl(222,47%,8%)',
                        2: 'hsl(217,33%,12%)',
                        3: 'hsl(217,33%,15%)',
                        border: 'hsl(217,33%,18%)',
                        elevated: 'hsl(222,47%,11%)',
                        overlay: 'hsl(222,47%,14%)',
                    },
                    /* Remap violet → electric cyan so all existing text-violet-* classes
                       in templates automatically adopt the new primary colour. */
                    violet: {
                        300: '#65c8f6',
                        400: '#35b7f3',
                        500: '#0da2e7',
                    },
                },
                fontFamily: {
                    sans: ['Inter', 'system-ui', 'sans-serif'],
                    mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                },
                borderRadius: {
                    DEFAULT: '0.625rem',
                    lg: '0.625rem',
                    xl: '0.875rem',
                    '2xl': '1.125rem',
                },
            }
        }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ── Design tokens ─────────────────────────────────────────────────────── */
        :root {
            --bg:           hsl(222,47%,6%);
            --fg:           hsl(210,40%,98%);
            --primary:      hsl(199,89%,48%);
            --primary-h:    hsl(199,89%,40%);
            --primary-muted:hsl(199,89%,20%);
            --primary-glow: hsla(199,89%,48%,0.15);
            --purple:       hsl(262,83%,58%);
            --gradient:     linear-gradient(135deg, hsl(199,89%,48%) 0%, hsl(262,83%,58%) 100%);
            --card:         hsl(222,47%,8%);
            --secondary:    hsl(217,33%,12%);
            --muted-bg:     hsl(217,33%,15%);
            --muted:        hsl(215,20%,55%);
            --border:       hsl(217,33%,18%);
            --elevated:     hsl(222,47%,11%);
            --overlay:      hsl(222,47%,14%);
            --destructive:  hsl(0,84%,60%);
            --radius:       0.625rem;
        }

        /* ── Base ──────────────────────────────────────────────────────────────── */
        body { background: var(--bg); color: var(--fg); }

        /* ── Sidebar ───────────────────────────────────────────────────────────── */
        .sidebar-link { transition: background 0.15s, color 0.15s; }
        .sidebar-link:hover { background: hsla(199,89%,48%,0.08); color: #35b7f3; }
        .sidebar-link.active {
            background: hsla(199,89%,48%,0.12);
            color: #65c8f6;
            border-left: 2px solid var(--primary);
            padding-left: calc(0.75rem - 2px);
        }

        /* ── Cards ─────────────────────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: border-color 0.15s;
        }
        .card:hover { border-color: hsl(217,33%,24%); }

        /* ── Buttons ───────────────────────────────────────────────────────────── */
        .btn-primary {
            background: var(--gradient);
            color: #fff;
            transition: opacity 0.15s, box-shadow 0.15s;
        }
        .btn-primary:hover {
            opacity: 0.88;
            box-shadow: 0 0 22px hsla(199,89%,48%,0.35);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all 0.15s;
        }
        .btn-ghost:hover { border-color: var(--primary); color: #35b7f3; }
        .btn-danger {
            background: transparent;
            border: 1px solid hsla(0,84%,60%,0.35);
            color: hsl(0,84%,72%);
            transition: all 0.15s;
        }
        .btn-danger:hover { background: hsla(0,84%,60%,0.1); border-color: var(--destructive); }
        .btn-primary:disabled, .btn-danger:disabled, .btn-ghost:disabled {
            opacity: 0.5; cursor: not-allowed; pointer-events: none;
        }

        /* ── Form fields ───────────────────────────────────────────────────────── */
        .field-input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg);
            border-radius: var(--radius);
            padding: 0.5rem 0.75rem;
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
            font-size: 0.875rem;
        }
        .field-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .field-input::placeholder { color: hsl(215,20%,35%); }
        select.field-input option { background: var(--card); }
        .field-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.35rem;
            display: block;
        }

        /* ── Badges ────────────────────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.18rem 0.55rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .badge-idle    { background: hsla(215,20%,55%,0.12); color: var(--muted);             border: 1px solid hsla(215,20%,55%,0.25); }
        .badge-syncing { background: hsla(199,89%,48%,0.12); color: hsl(199,89%,65%);         border: 1px solid hsla(199,89%,48%,0.35); }
        .badge-done    { background: hsla(160,84%,39%,0.12); color: hsl(160,84%,55%);         border: 1px solid hsla(160,84%,39%,0.35); }
        .badge-error   { background: hsla(0,84%,60%,0.12);   color: hsl(0,84%,72%);           border: 1px solid hsla(0,84%,60%,0.35); }
        .badge-warn    { background: hsla(38,92%,50%,0.12);   color: hsl(38,92%,65%);         border: 1px solid hsla(38,92%,50%,0.35); }

        /* ── Spinner ───────────────────────────────────────────────────────────── */
        .spinner {
            display: inline-block;
            width: 0.6rem; height: 0.6rem;
            border: 1.5px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Progress bar ──────────────────────────────────────────────────────── */
        .progress-bar {
            height: 2px;
            background: var(--border);
            border-radius: 9999px;
            overflow: hidden;
            margin-top: 0.35rem;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 9999px;
            transition: width 0.4s ease;
        }

        /* ── Glow dot ──────────────────────────────────────────────────────────── */
        .glow-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: hsl(160,84%,45%);
            box-shadow: 0 0 6px hsl(160,84%,45%);
            display: inline-block; flex-shrink: 0;
        }
        .glow-dot.red { background: var(--destructive); box-shadow: 0 0 6px var(--destructive); }

        /* ── Table rows ────────────────────────────────────────────────────────── */
        .table-row { border-bottom: 1px solid var(--secondary); transition: background 0.1s; }
        .table-row:last-child { border-bottom: none; }
        .table-row:hover { background: hsla(199,89%,48%,0.04); }

        /* ── Divider ───────────────────────────────────────────────────────────── */
        .divider { border-color: var(--border); }

        /* ── Scrollbar ─────────────────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(217,33%,25%); }

        /* Field tooltip */
        .tip { position: relative; display: inline-flex; align-items: center; margin-left: 4px; cursor: help; }
        .tip svg { color: #475569; }
        .tip:hover svg { color: #94a3b8; }
        .tip-text {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border: 1px solid rgba(148,163,184,0.15);
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.5;
            padding: 6px 9px;
            border-radius: 6px;
            width: max-content;
            max-width: 260px;
            z-index: 50;
            white-space: normal;
            pointer-events: none;
            font-weight: 400;
        }
        .tip:hover .tip-text { display: block; }
    </style>
</head>
<body class="h-full flex font-sans antialiased">

<!-- Sidebar -->
<aside class="w-52 flex-shrink-0 flex flex-col border-r border-surface-border" style="background: var(--card); min-height:100vh; position:sticky; top:0; height:100vh;">

    <!-- Logo -->
    <div class="px-4 py-4 border-b border-surface-border">
        <a href="/" class="flex items-center gap-2.5">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style="background: var(--gradient);">
                <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <span class="text-sm font-semibold text-slate-100 tracking-wide">Conduit</span>
        </a>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">
        <p class="px-3 py-1.5 text-xs font-medium text-slate-600 uppercase tracking-wider">Knowledge</p>
        <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            Sources
        </a>
        <a href="/sources/create" class="sidebar-link {% if 'sources/create' in request.url.path %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Add Source
        </a>

        <div class="pt-2">
        <p class="px-3 py-1.5 text-xs font-medium text-slate-600 uppercase tracking-wider">Experiences</p>
        <a href="/experience" class="sidebar-link {% if request.url.path == '/experience' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            Experiences
        </a>
        <a href="/experience/create" class="sidebar-link {% if request.url.path == '/experience/create' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Add Experience
        </a>
        <a href="/experience/map" class="sidebar-link {% if request.url.path == '/experience/map' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/>
            </svg>
            Experience Map
        </a>
        </div>

        <div class="pt-2">
        <p class="px-3 py-1.5 text-xs font-medium text-slate-600 uppercase tracking-wider">System</p>
        <a href="/settings" class="sidebar-link {% if request.url.path == '/settings' %}active{% endif %} flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Settings
        </a>
        </div>
    </nav>

</aside>

<!-- Main -->
<div class="flex-1 overflow-auto">
    <main class="p-8">
        {% block content %}{% endblock %}
    </main>
</div>

{% block scripts %}{% endblock %}
<script>
// Disable submit buttons on form submit to prevent double-submission.
// Excludes forms that opt-out with data-no-loading or that use AJAX (Preview button).
document.addEventListener('submit', function(e) {
    var form = e.target;
    if (form.dataset.noLoading) return;
    var btn = form.querySelector('button[type=submit]');
    if (!btn) return;
    btn.disabled = true;
    // Replace inner content with spinner + label
    var label = btn.innerText.trim();
    btn.innerHTML =
        '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">' +
        '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>' +
        '<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>' +
        '</svg>' +
        '<span>' + label + '…</span>';
}, true);
</script>
</body>
</html>
