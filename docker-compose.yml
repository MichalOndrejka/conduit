services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  conduit:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - conduit_data:/data
      - ./config.json:/app/config.json   # mount config for easy editing without rebuild
    environment:
      # Qdrant — must point to the service name inside compose network
      CONDUIT_CONFIG: /app/config.json
      CONDUIT_DATA_DIR: /data
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Optional: stable Fernet key for credential encryption (base64url, 44 chars).
      # If not set, a key is auto-generated in the data volume on first start.
      # CONDUIT_SECRET_KEY: ${CONDUIT_SECRET_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
  conduit_data:
